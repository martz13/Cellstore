name: Build CellStore Windows

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Descargar herramientas externas (SumatraPDF y Poppler)
        run: |
          New-Item -ItemType Directory -Path "assets\tools" -Force

          # SumatraPDF — Descarga de archivo .zip estable y extracción del portable
          Invoke-WebRequest -Uri "https://www.sumatrapdfreader.org/dl/rel/3.5.2/SumatraPDF-3.5.2-64.zip" -OutFile "sumatra.zip"
          Expand-Archive -Path "sumatra.zip" -DestinationPath "assets\tools\sumatra_temp" -Force
          Move-Item -Path "assets\tools\sumatra_temp\SumatraPDF-3.5.2-64.exe" -Destination "assets\tools\SumatraPDF.exe" -Force
          Remove-Item -Path "assets\tools\sumatra_temp" -Recurse -Force
          Remove-Item -Path "sumatra.zip" -Force

          # Poppler — requerido por pdf2image para vista previa
          Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip" -OutFile "poppler.zip"
          Expand-Archive -Path "poppler.zip" -DestinationPath "assets\tools\poppler" -Force

      - name: Verificar estructura interna de Poppler
        run: |
          Get-ChildItem -Path "assets\tools\poppler" -Recurse -Filter "pdftoppm.exe" | Select-Object FullName

      - name: Crear Ejecutable Principal (CellStore en modo OneDir)
        run: |
          pyinstaller --onedir --windowed `
            --name "CellStore" `
            --icon="assets/images/icono.ico" `
            --add-data "assets;assets" `
            --add-data "database;database" `
            --add-data "styles;styles" `
            --add-data "utils;utils" `
            --add-data "views;views" `
            main.py

      - name: Preparar carpeta de entrega
        run: |
          New-Item -ItemType Directory -Path "Entrega_Final" -Force
          # Como es onedir, PyInstaller crea la carpeta dist\CellStore
          # Copiamos todo el contenido de esa carpeta a Entrega_Final
          Copy-Item -Path "dist\CellStore\*" -Destination "Entrega_Final\" -Recurse -Force

      - name: Subir ejecutable a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: CellStore_Sistema_Completo
          path: Entrega_Final\*
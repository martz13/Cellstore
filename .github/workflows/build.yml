name: Build CellStore Windows

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Crear Ejecutable Principal (CellStore.exe)
        run: |
          pyinstaller --onefile --windowed --name "CellStore" --icon="assets/images/icono.ico" --add-data "assets;assets" --add-data "database;database" --add-data "styles;styles" --add-data "utils;utils" --add-data "views;views" main.py

      - name: Preparar carpeta de entrega
        run: |
          mkdir Entrega_Final
          copy "dist\CellStore.exe" Entrega_Final\

      - name: Subir ejecutable a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: CellStore_Sistema_Completo
          path: Entrega_Final\*